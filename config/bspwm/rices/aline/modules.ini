[module/bi]
type = custom/text
label = "%{T4}¯éÂ%{T-}"
label-foreground = ${color.mc}
label-background = ${color.bg}

[module/bd]
type = custom/text
label = "%{T4}¯é┤%{T-}"
label-foreground = ${color.mc}
label-background = ${color.bg}

######################################################

[module/date]
type = internal/date

interval = 1.0

time = "%I:%M %P"
date-alt = "%a, %d %b %Y"
format = <label>
format-prefix = ""

label = "%time%%date%"
label-background = ${color.mc}

######################################################

[module/filesystem]
type = internal/fs
mount-0 = /

interval = 60
fixed-values = false

format-mounted = <label-mounted>
format-mounted-prefix = "´éá"
format-mounted-prefix-background = ${color.mc}
format-mounted-prefix-foreground = ${color.purple}

format-unmounted = <label-unmounted>
format-unmounted-prefix = "´éá"
format-unmounted-prefix-background = ${color.mc}
format-unmounted-prefix-foreground = ${color.purple}

label-mounted = "%used%"
label-mounted-padding = 1
label-mounted-background = ${color.mc}

label-unmounted = %mountpoint%: not mounted
label-unmounted-padding = 1
label-unmounted-background = ${color.mc}

######################################################

[module/network]
type = internal/network
interface = ${system.sys_network_interface}

interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix = "´ç½"
format-connected-prefix-foreground = ${color.green}
format-connected-background = ${color.mc}

speed-unit = ""
label-connected = " %{A1:OpenApps --netmanager:}%downspeed%%{A}"
label-connected-background = ${color.mc}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "´ç½"
format-disconnected-background = ${color.mc}
format-disconnected-prefix-foreground = ${color.red}

label-disconnected = " %{A1:OpenApps --netmanager:}Offline%{A}"

######################################################

[module/pulseaudio]
type = internal/pulseaudio

;;sink = alsa_output.pci-0000_00_1b.0.analog-stereo
use-ui-max = true
interval = 5
;;<bar-volume>
format-volume = <label-volume>
format-volume-prefix = "´Ç¿"
format-volume-prefix-foreground = ${color.teal}
format-volume-background = ${color.mc}

label-volume = "%percentage%"
label-volume-padding = 1

format-muted = <label-muted>
format-muted-background = ${color.mc}
format-muted-prefix = "´Ü®"
format-muted-prefix-foreground = ${color.teal}
label-muted = "Muted"
label-muted-padding = 1
label-muted-foreground = ${color.red}

click-right = OpenApps --soundcontrol

######################################################

[module/brightness]
type = internal/backlight
card = ${system.sys_graphics_card}

enable-scroll = false

format = <ramp><label>
label = "%percentage%%"
label-padding = 2 pt

ramp-0 = ´â½
ramp-1 = ´â½
ramp-2 = ´â½
ramp-font = 2
ramp-foreground = ${color.yellow}

######################################################

[module/battery]
type = internal/battery
full-at = 99
battery = ${system.sys_battery}
adapter = ${system.sys_adapter}
poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging><label-charging>
format-charging-background = ${color.mc}
label-charging = "%percentage%%"
label-charging-padding = 1

format-discharging = <ramp-capacity><label-discharging>
format-discharging-background = ${color.mc}
label-discharging = "%percentage%%"
label-discharging-padding = 1

format-full = <label-full>
format-full-prefix = "´ëÇ"
format-full-prefix-font = 2
format-full-background = ${color.mc}
format-full-prefix-foreground = ${color.green}
label-full = "%percentage%%"
label-full-padding = 1

ramp-capacity-0 = ´ëä
ramp-capacity-1 = ´ëâ
ramp-capacity-2 = ´ëé
ramp-capacity-3 = ´ëü
ramp-capacity-4 = ´ëÇ
ramp-capacity-foreground = ${color.yellow}
ramp-capacity-font = 2

animation-charging-0 = ´ëä
animation-charging-1 = ´ëâ
animation-charging-2 = ´ëé
animation-charging-3 = ´ëü
animation-charging-4 = ´ëÇ
