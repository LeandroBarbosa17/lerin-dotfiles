# Helix 2077 Theme
# Ported from VSCode "2077" Theme
# Vibrant Cyberpunk Aesthetic

# Attribute Highlight 
'attribute' = { fg = 'yellow' }

# Constructor Highlight
'constructor' = { fg = 'pink', modifiers = ['bold'] }

# Constant Highlights
'constant' = { fg = 'purple' }
'constant.builtin' = { fg = 'pink' }
'constant.numeric' = { fg = 'yellow' }
'constant.character' = { fg = 'purple' }

# String Highlights
'string' = { fg = 'cyan' }
'string.regexp' = { fg = 'magenta' }

# Comment Highlights
'comment' = { fg = 'comment_blue', modifiers = ['italic'] }

# Variable Highlights
'variable' = { fg = 'pink' }
'variable.builtin' = { fg = 'pink' }
'variable.parameter' = { fg = 'pink' }
'variable.other.member' = { fg = 'blue_alt' }

# Label Highlights
'label' = { fg = 'yellow' }

# Punctuation Highlights
'punctuation' = { fg = 'yellow_soft' }
'punctuation.bracket' = { fg = 'yellow_soft' }
'punctuation.delimiter' = { fg = 'yellow_soft' }

# Keyword Highlights
'keyword' = { fg = 'magenta_neon', modifiers = ['bold'] }
'keyword.control' = { fg = 'magenta_neon', modifiers = ['bold'] }
'keyword.control.import' = { fg = 'cyan' }

# Operator Highlights
'operator' = { fg = 'magenta_neon' }

# Directive Highlights
'directive' = { fg = 'magenta_neon' }
'special' = { fg = 'yellow' }

# Namespace Highlights
'namespace' = { fg = 'purple', modifiers = ['italic'] }

# Function Highlights 
'function' = { fg = 'blue_light' }
'function.builtin' = { fg = 'yellow' }
'function.method' = { fg = 'blue_light' }

# Tag Highlights 
'tag' = { fg = 'pink' }

# Type Highlights 
'type' = { fg = 'pink' }
'type.builtin' = { fg = 'magenta_neon', modifiers = ['italic'] }

# Markup Highlights (Markdown, etc.)
'markup.heading' = { fg = 'pink', modifiers = ['bold'] }
'markup.bold' = { fg = 'pink', modifiers = ['bold'] }
'markup.italic' = { fg = 'pink', modifiers = ['italic'] }
'markup.link.url' = { fg = 'magenta' }
'markup.link.text' = { fg = 'pink' }
'markup.list' = { fg = 'pink' }
'markup.raw' = { fg = 'white' }

# Diff Highlights
'diff.delta' = { fg = 'blue_light' }
'diff.minus' = { fg = 'pink' }
'diff.plus' = { fg = 'yellow' }

# ========================== INTERFACE ========================= 

'ui.background' = { bg = 'bg' }
'ui.text' = { fg = 'fg' }
'ui.cursor' = { bg = 'neon_pink', fg = 'bg' }
'ui.window' = { fg = 'comment_blue' }

'ui.linenr' = { fg = 'neon_pink', bg = 'bg' }
'ui.linenr.selected' = { fg = 'blue_alt', bg = 'bg', modifiers = ['bold'] }

'ui.statusline' = { fg = 'blue_alt', bg = 'status_bg' }
'ui.statusline.inactive' = { fg = 'comment_blue', bg = 'bg' }

'ui.bufferline' = { fg = 'blue_alt', bg = 'tab_inactive' }
'ui.bufferline.active' = { fg = 'white', bg = 'tab_active', modifiers = ['bold'] }

'ui.selection' = { bg = 'selection' }
'ui.highlight' = { bg = 'line_highlight' }
'ui.cursorline' = { bg = 'line_highlight' }

'ui.menu' = { fg = 'fg', bg = 'widget_bg' }
'ui.menu.selected' = { fg = 'white', bg = 'list_select' }

'ui.popup' = { bg = 'widget_bg', fg = 'white' }
'ui.popup.info' = { bg = 'widget_bg', fg = 'blue_alt', modifiers = ['bold'] }

'ui.virtual.ruler' = { bg = 'ruler_color' }

# Diagnostics
'error' = { fg = 'error_red', modifiers = ['bold'] }
'warning' = { fg = 'warning_yellow', modifiers = ['bold'] }
'info' = { fg = 'info_purple', modifiers = ['bold'] }
'hint' = { fg = 'cyan', modifiers = ['bold'] }

'diagnostic.error' = { underline = { color = 'error_red', style = 'curl' } }
'diagnostic.warning' = { underline = { color = 'warning_yellow', style = 'curl' } }
'diagnostic.info' = { underline = { color = 'info_purple', style = 'curl' } }
'diagnostic.hint' = { underline = { color = 'cyan', style = 'curl' } }

[palette]
# Sintaxe extraída diretamente do seu JSON
comment_blue = '#0098df'
cyan         = '#0ef3ff'
yellow       = '#ffd400'
pink         = '#ff2e97'
purple       = '#c832ff'
magenta_neon = '#ff2cf1'
blue_alt     = '#40a9ff'
yellow_soft  = '#ffee80'
blue_light   = '#39c0ff'
magenta      = '#ff22f0'
white        = '#ffffff'

# Cores da Interface (UI) extraídas das chaves "colors" do VSCode
bg             = '#030d22'
fg             = '#fdfeff'
neon_pink      = '#ee0077'
selection      = '#310072'
line_highlight = '#1c1347'
ruler_color    = '#11215e'

# Widgets e Abas
widget_bg      = '#04112c'
status_bg      = '#0a0631'
tab_active     = '#1d1641'
tab_inactive   = '#141138'
list_select    = '#073170'

# Mensagens/Diagnostics
error_red      = '#ac077a'
warning_yellow = '#fad46d'
info_purple    = '#af21e7'
